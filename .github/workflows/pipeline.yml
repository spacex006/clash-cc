name: 🔄 Proxy Pipeline

on:
  schedule:
    - cron: '0 */10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    name: Fetch → Test → Geo → Convert
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🌍 Download GeoLite2
        run: |
          curl -fsSL -o Country.mmdb \
            https://raw.githubusercontent.com/P3TERX/GeoLite.mmdb/download/GeoLite2-Country.mmdb
          ls -lh Country.mmdb

      - name: 🚀 Download Mihomo
        run: |
          set -e
          echo "=== دریافت release info ==="
          RELEASE_JSON=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest)
          MIHOMO_VERSION=$(echo "$RELEASE_JSON" | grep -oP '"tag_name":\s*"\K[^"]+' | head -1)
          echo "Mihomo version: $MIHOMO_VERSION"
          
          ASSET_URL=$(echo "$RELEASE_JSON" | grep -oP '"browser_download_url":\s*"\K[^"]+' | grep -i 'linux-amd64' | grep -v 'compatible' | grep -E '\.(gz|tar\.gz)$' | head -1)
          
          if [ -z "$ASSET_URL" ]; then
            echo "❌ Asset پیدا نشد."
            exit 1
          fi
          
          echo "Asset URL: $ASSET_URL"
          curl -fsSL -o mihomo.gz "$ASSET_URL"
          
          if [[ "$ASSET_URL" == *.tar.gz ]]; then
            tar -xzf mihomo.gz
            BIN=$(find . -maxdepth 2 -name "mihomo*" -type f | head -1)
            mv "$BIN" mihomo
          else
            gunzip mihomo.gz
          fi
          
          chmod +x mihomo
          ls -lh mihomo
          ./mihomo -v

      - name: 🚀 Run pipeline
        env:
          URL: ${{ secrets.URL }}
        run: python main.py

      - name: 💾 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/configs.txt output/profile.yaml
          if git diff --staged --quiet; then
            echo "✅ تغییری نبود."
          else
            git commit -m "🔄 proxies updated $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

name: 🔄 Proxy Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # هر ۶ ساعت
  workflow_dispatch:
  push:
    paths:
      - 'urls.txt'

permissions:
  contents: write

jobs:
  run:
    name: Fetch → Test → Geo → Convert
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: 🌍 Download GeoLite2
        run: |
          curl -fsSL -o Country.mmdb \
            https://raw.githubusercontent.com/P3TERX/GeoLite.mmdb/download/GeoLite2-Country.mmdb
          ls -lh Country.mmdb

      - name: 🚀 Download Mihomo
        run: |
          MIHOMO_VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep tag_name | cut -d '"' -f 4)
          echo "Mihomo version: $MIHOMO_VERSION"
          curl -fsSL -o mihomo.gz \
            "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.gz"
          gunzip mihomo.gz
          chmod +x mihomo
          ./mihomo -v
          ls -lh mihomo

      - name: 🚀 Run pipeline
        run: python main.py

      - name: 💾 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/configs.txt output/profile.yaml
          if git diff --staged --quiet; then
            echo "✅ تغییری نبود."
          else
            git commit -m "🔄 proxies updated $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

name: 🔄 Proxy Pipeline

on:
  schedule:
    - cron: '0 */2 * * *'   # هر ۶ ساعت یکبار
  workflow_dispatch:          # اجرای دستی از تب Actions
  push:
    paths:
      - 'urls.txt'            # با تغییر سورس‌ها اتوماتیک اجرا شود

permissions:
  contents: write

jobs:
  run:
    name: Fetch → Dedup → Fix → Convert → Validate
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 📦 Install dependencies
        run: pip install requests pyyaml

      - name: 🚀 Run pipeline
        run: python main.py

      - name: 🐛 Debuge
        run: python debug.py
          
      - name: 💾 Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/configs.txt output/profile.yaml
          if git diff --staged --quiet; then
            echo "✅ تغییری نبود."
          else
            git commit -m "🔄 proxies updated $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
